id: abstract_psychology
name: 抽象心理直说
description: 检查“他/她感到、觉得、意识到、明白”这类直接宣布心理和结论的写法。
severity: warning
scope: full
type: regex
threshold: 2
message: "检测到抽象心理直说，优先把情绪、判断和顿悟改写进动作、停顿、代价或关系反应。"
patterns:
  - "(?:他|她|我|你)[^。！？\\n]{0,10}(?:感到|觉得)[^。！？\\n]{0,18}(?:很|十分|有些|格外|无比|一阵|一种)"
  - "(?:他|她|我|你)[^。！？\\n]{0,10}(?:意识到|明白|懂得)[^。！？\\n]{0,18}"
